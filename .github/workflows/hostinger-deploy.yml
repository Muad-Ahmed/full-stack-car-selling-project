name: VPS Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            set -e

            cd /var/www/cars

            # Maintenance mode — suppress error if artisan is unavailable
            php artisan down --retry=5 || true

            # Pull latest code from main
            git pull origin main

            # ---------------------------------------------------------------
            # Composer: wipe vendor first to avoid the "SebastianBergmann\Version
            # not found" error that occurs when Composer tries to run its
            # pre-package-uninstall scripts against a partially-broken vendor dir.
            # ---------------------------------------------------------------
            rm -rf vendor

            export COMPOSER_ALLOW_SUPERUSER=1
            composer install \
              --no-dev \
              --no-interaction \
              --prefer-dist \
              --optimize-autoloader

            # ---------------------------------------------------------------
            # Frontend assets — build on the server after the pull so the
            # manifest matches the newly deployed code exactly.
            # ---------------------------------------------------------------
            npm ci --prefer-offline
            npm run build

            # Database migrations
            php artisan migrate:fresh --seed --force

            # Clear and rebuild all Laravel caches
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Fix storage permissions so Nginx/PHP-FPM can write
            chown -R www-data:www-data storage bootstrap/cache
            chmod -R 775 storage bootstrap/cache

            # Bring the application back online
            php artisan up
